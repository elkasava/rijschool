name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint --max-warnings 0
        continue-on-error: true   # warn only — Next.js ESLint config may not be strict yet

      - name: Build
        run: npm run build
        env:
          # Dummy value so the build doesn't fail on missing env
          ADMIN_PASSWORD: ci-placeholder
